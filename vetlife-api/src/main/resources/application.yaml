spring:
  application:
    name: vetlife-api
  main:
    allow-bean-definition-overriding: true
    
  datasource:
    url: jdbc:postgresql://localhost:5432/vetlife_db
    username: vetlife_user
    password: vetlife_pass
    driver-class-name: org.postgresql.Driver
    
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        
  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method

server:
  port: 8080