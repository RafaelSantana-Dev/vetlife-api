spring:
  application:
    name: vetlife-api
  datasource:
    url: jdbc:postgresql://localhost:5432/vetlife_db
    username: vetlife_user
    password: vetlife_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080