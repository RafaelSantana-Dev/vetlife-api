

services:

  postgres:
    image: postgres:15
    container_name: vetlife_postgres
    restart: always
    environment:
      POSTGRES_DB: vetlife_db
      POSTGRES_USER: vetlife_user
      POSTGRES_PASSWORD: vetlife_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vetlife_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:v