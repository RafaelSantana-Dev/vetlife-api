name: VetLife API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./vetlife-api

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Dar permissão de execução ao Maven Wrapper
      run: chmod +x mvnw

    - name: Compilar e Rodar Testes (Unitários)
      run: ./mvnw -B test --file pom.xml